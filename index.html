<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b1220" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="RTAT" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>Real Time Appointment Tracker (RTAT) — Infinity Home Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0b1220; --panel:#111a2e; --panel-2:#0f1829; --panel-3:#162039;
    --border:#1e2a44; --border-soft:#172137;
    --text:#e6ecf5; --text-dim:#8a97b2; --text-mute:#5f6e8a;
    --primary:#2CB2DF; --primary-dim:#1A89AE; --primary-soft:rgba(44,178,223,.12);
    --good:#67A64B; --good-text:#8bd169; --good-soft:rgba(103,166,75,.15);
    --bad:#A02121;  --bad-text:#e47a7a;  --bad-soft:rgba(160,33,33,.18);
    --warn:#d9a441; --warn-text:#f0c076; --warn-soft:rgba(217,164,65,.15);
    --callback-text:#9fd3ff; --callback-soft:rgba(44,178,223,.15);
    --chip:#17233c;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
    --hit: 48px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:'Inter','Aptos Narrow',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:15px; line-height:1.4; min-height:100vh; -webkit-font-smoothing:antialiased; }
  a { color: var(--primary); text-decoration: none; }
  button, input, select, textarea { font-family: inherit; font-size: inherit; }
  h1,h2,h3,h4 { margin:0; }

  /* ==================== MOBILE-FIRST LAYOUT (default) ==================== */
  .app { display:flex; flex-direction:column; min-height:100vh; }
  .sidebar { display: none; }

  .topbar {
    position: sticky; top: 0; z-index: 40;
    padding: calc(10px + var(--safe-top)) 14px 10px;
    background: rgba(11,18,32,.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 10px;
  }
  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .brand .mark {
    width: 34px; height: 34px; border-radius: 8px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dim));
    display: grid; place-items: center; color: #001018; font-weight: 800;
    font-size: 11px; letter-spacing: .5px; flex-shrink: 0;
  }
  .brand .namewrap { display: flex; flex-direction: column; line-height: 1.15; min-width: 0; }
  .brand .name {
    font-family: 'DM Serif Display', Georgia, serif; font-size: 16px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .brand .sub {
    font-size: 10px; letter-spacing: 2px; color: var(--text-mute);
    text-transform: uppercase; font-weight: 700;
  }
  .persona-chip {
    height: var(--hit); min-width: var(--hit); padding: 0 12px;
    border-radius: 999px; background: var(--panel-3); border: 1px solid var(--border);
    color: var(--text); display: flex; align-items: center; gap: 8px;
    cursor: pointer;
  }
  .persona-chip .initials {
    width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: #001018;
    font-weight: 800; font-size: 11px; display: grid; place-items: center;
  }
  .persona-chip .role { font-size: 11px; color: var(--text-dim); }
  .persona-chip select {
    position: absolute; opacity: 0; inset: 0; cursor: pointer;
  }
  .persona-wrap { position: relative; }

  .scope-banner {
    padding: 10px 14px; background: var(--primary-soft);
    border-bottom: 1px solid var(--border-soft);
    font-size: 12px; color: var(--text-dim);
  }
  .scope-banner b { color: var(--text); }

  .main {
    flex: 1; padding: 16px 14px calc(88px + var(--safe-bot));
    max-width: 1400px; width: 100%; margin: 0 auto;
  }

  .bottomnav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    display: flex; justify-content: space-around; padding-bottom: var(--safe-bot);
    background: rgba(11,18,32,.97); backdrop-filter: blur(10px);
    border-top: 1px solid var(--border-soft);
  }
  .bottomnav button {
    flex: 1; min-height: 62px; background: none; border: 0; color: var(--text-dim);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; font-size: 11px; cursor: pointer; padding: 8px 4px;
  }
  .bottomnav button .ico { font-size: 20px; line-height: 1; }
  .bottomnav button.active { color: var(--primary); }
  .bottomnav button.active .ico { transform: scale(1.05); }

  /* Page titles */
  .pagehead { margin-bottom: 16px; }
  .pagetitle { font-family: 'DM Serif Display', Georgia, serif; font-size: 26px; line-height: 1.1; }
  .pagetitle .accent { color: var(--primary); }
  .pagesub { color: var(--text-dim); font-size: 13px; margin-top: 4px; }

  /* View switcher (saved views on Today page) */
  .viewswitch {
    display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px;
    margin-bottom: 12px; -webkit-overflow-scrolling: touch;
  }
  .viewswitch::-webkit-scrollbar { display: none; }
  .viewswitch button {
    min-height: 40px; padding: 0 14px; border-radius: 999px;
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text-dim); font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .viewswitch button.active {
    background: var(--primary); color: #001018; border-color: var(--primary);
  }

  /* KPI tiles */
  .kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .kpi {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
  }
  .kpi .k { color: var(--text-mute); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .kpi .v { font-size: 26px; font-weight: 800; margin-top: 4px; }
  .kpi .sub { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
  .kpi.good .v { color: var(--good-text); }
  .kpi.bad .v { color: var(--bad-text); }
  .kpi.warn .v { color: var(--warn-text); }

  /* Hero GM tile */
  .herogm {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, var(--panel), var(--panel-3));
    border: 1px solid var(--border);
    border-radius: 14px; padding: 18px;
  }
  .herogm .k { color: var(--text-mute); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; }
  .herogm .v {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 52px; line-height: 1; margin-top: 8px; font-weight: 400;
  }
  .herogm .sub { color: var(--text-dim); font-size: 12px; margin-top: 8px; }
  .herogm.good .v { color: var(--good-text); }
  .herogm.warn .v { color: var(--warn-text); }
  .herogm.bad  .v { color: var(--bad-text); }

  /* Appt card */
  .appt {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
    display: grid; grid-template-columns: 1fr auto; gap: 8px 12px;
    align-items: start;
  }
  .appt .time { font-weight: 700; font-size: 13px; color: var(--primary); }
  .appt .cust { font-weight: 700; font-size: 16px; margin-top: 2px; }
  .appt .meta { color: var(--text-dim); font-size: 12px; margin-top: 3px; }
  .appt .meta .dot { color: var(--text-mute); }
  .appt .status { font-size: 11px; padding: 3px 8px; border-radius: 4px; white-space: nowrap; height: fit-content; }
  .status.open { background: var(--chip); color: var(--text-dim); }
  .status.sold { background: var(--good-soft); color: var(--good-text); }
  .status.nosale { background: var(--bad-soft); color: var(--bad-text); }
  .status.callback { background: var(--callback-soft); color: var(--callback-text); }
  .status.noshow { background: var(--warn-soft); color: var(--warn-text); }
  .appt .cta {
    grid-column: 1 / -1; min-height: var(--hit);
    background: var(--primary); color: #001018; border: 0; border-radius: 10px;
    font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 6px;
  }
  .appt .cta.secondary { background: var(--panel-3); color: var(--text); border: 1px solid var(--border); }

  /* Manual-entry button */
  .manual-cta {
    width: 100%; min-height: var(--hit); border-radius: 10px;
    background: var(--panel-3); border: 1px dashed var(--border);
    color: var(--text); font-weight: 600; cursor: pointer; margin-bottom: 14px;
  }

  /* Section title */
  .section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-mute); margin: 20px 0 10px;
  }

  /* Rollup tables */
  .rollup { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .rollup table { width: 100%; border-collapse: collapse; }
  .rollup th {
    text-align: left; padding: 12px; background: var(--panel-2);
    color: var(--text-mute); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  .rollup td { padding: 14px 12px; border-bottom: 1px solid var(--border-soft); font-size: 14px; }
  .rollup tr:last-child td { border-bottom: 0; }
  .rollup td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .rollup .mini-bar { height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; margin-top: 4px; }
  .rollup .mini-bar > span { display: block; height: 100%; background: var(--primary); }
  .rollup .name { font-weight: 600; }
  .rollup .pill {
    display: inline-block; padding: 2px 6px; border-radius: 3px;
    font-size: 11px; font-weight: 600;
  }
  .pill.good { background: var(--good-soft); color: var(--good-text); }
  .pill.warn { background: var(--warn-soft); color: var(--warn-text); }
  .pill.bad  { background: var(--bad-soft);  color: var(--bad-text); }

  /* Scroll wrapper for narrow-screen tables */
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Queue sync button */
  .syncbar {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .syncbar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good-text); }
  .syncbar.queued .dot { background: var(--warn-text); }
  .syncbar .label { flex: 1; font-size: 13px; }
  .syncbar button {
    background: var(--primary); color: #001018; border: 0; border-radius: 6px;
    padding: 6px 12px; font-weight: 700; cursor: pointer; font-size: 12px;
  }

  /* Modal (full-screen on phone; centered on tablet+) */
  .scrim {
    position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200;
    display: none; align-items: stretch; justify-content: stretch;
  }
  .scrim.open { display: flex; }
  .modal {
    background: var(--panel); color: var(--text);
    width: 100%; max-width: 100%; height: 100%;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .modal .mhead {
    padding: calc(14px + var(--safe-top)) 16px 12px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border-soft); background: var(--panel);
  }
  .modal .mhead h3 { font-size: 18px; flex: 1; }
  .modal .close-x {
    width: 40px; height: 40px; border: 0; background: transparent;
    color: var(--text); font-size: 24px; cursor: pointer; border-radius: 6px;
  }
  .modal .mbody {
    flex: 1; overflow-y: auto; padding: 16px;
    padding-bottom: calc(16px + var(--safe-bot));
  }
  .modal .mfoot {
    padding: 12px 16px calc(12px + var(--safe-bot));
    display: flex; gap: 10px; border-top: 1px solid var(--border-soft);
    background: var(--panel);
  }

  /* Forms */
  .field { margin-bottom: 16px; }
  .field .lbl { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .field .hint { font-size: 11px; color: var(--text-mute); margin-top: 4px; }
  .input, .select, .textarea {
    width: 100%; min-height: var(--hit); padding: 10px 12px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
  }
  .input:focus, .select:focus, .textarea:focus {
    outline: 2px solid var(--primary); outline-offset: -1px;
  }
  .textarea { min-height: 80px; resize: vertical; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* Outcome buttons (modal step 1) */
  .outcome-primary {
    width: 100%; min-height: 70px; border: 0; border-radius: 14px;
    background: linear-gradient(135deg, var(--good), #5a9742);
    color: #fff; font-size: 22px; font-weight: 800; letter-spacing: 1px;
    cursor: pointer; box-shadow: 0 4px 12px rgba(103,166,75,.3);
    margin-bottom: 10px;
  }
  .outcome-primary .ico { font-size: 28px; vertical-align: middle; margin-right: 10px; }
  .outcome-secondary-btn {
    width: 100%; min-height: 54px; border: 1px solid var(--border); border-radius: 12px;
    background: var(--panel-2); color: var(--text); font-weight: 600; cursor: pointer;
  }
  .outcome-other-tray {
    display: none; margin-top: 10px; padding: 14px; background: var(--panel-2);
    border: 1px solid var(--border); border-radius: 12px;
  }
  .outcome-other-tray.open { display: block; }
  .outcome-other-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  }
  .outcome-other-grid button {
    min-height: 72px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--panel-3); color: var(--text); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: 600; font-size: 12px; gap: 4px; padding: 6px;
  }
  .outcome-other-grid button .ico { font-size: 20px; }
  .outcome-other-grid button:hover { border-color: var(--primary); }

  /* GM chip */
  .gm-chip {
    display: inline-flex; align-items: center; padding: 6px 12px;
    border-radius: 999px; font-weight: 800; font-size: 15px;
    background: var(--chip); color: var(--text-dim);
  }
  .gm-chip.good { background: var(--good-soft); color: var(--good-text); }
  .gm-chip.warn { background: var(--warn-soft); color: var(--warn-text); }
  .gm-chip.bad  { background: var(--bad-soft);  color: var(--bad-text); }

  .live-stats {
    background: var(--panel-3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .live-stats .l { font-size: 12px; color: var(--text-mute); text-transform: uppercase; letter-spacing: 1px; }
  .live-stats .r { text-align: right; }
  .live-stats .net { font-size: 18px; font-weight: 800; }

  /* Fin radio group */
  .radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .radio-tile {
    position: relative; min-height: var(--hit);
    display: flex; align-items: center; justify-content: center; padding: 8px;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .radio-tile input { position: absolute; opacity: 0; inset: 0; cursor: pointer; }
  .radio-tile.checked { background: var(--primary-soft); border-color: var(--primary); color: var(--text); }

  /* Multi-service cart */
  .services-list {
    background: var(--panel-3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 14px;
  }
  .services-list .row {
    display: flex; justify-content: space-between; gap: 8px; padding: 6px 0;
    border-bottom: 1px solid var(--border-soft); font-size: 14px;
  }
  .services-list .row:last-child { border-bottom: 0; }
  .services-list .name { font-weight: 600; }
  .services-list .amt { font-variant-numeric: tabular-nums; }
  .services-list .total { padding-top: 8px; border-top: 1px solid var(--border); margin-top: 6px; font-weight: 700; }

  /* Confirmation */
  .confirm {
    padding: 24px 16px; text-align: center;
  }
  .confirm .icn {
    width: 70px; height: 70px; border-radius: 50%; background: var(--good-soft);
    color: var(--good-text); display: grid; place-items: center; margin: 0 auto 16px;
    font-size: 40px; font-weight: 800;
  }
  .confirm h2 { font-size: 22px; margin-bottom: 8px; }
  .confirm p { color: var(--text-dim); font-size: 14px; margin-bottom: 16px; }
  .crm-stamp {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    background: var(--good-soft); color: var(--good-text);
    font-size: 12px; font-weight: 600; margin-bottom: 20px;
  }
  .payload-peek {
    background: var(--panel-3); border: 1px solid var(--border); border-radius: 8px;
    text-align: left; margin-top: 20px;
  }
  .payload-peek summary {
    padding: 10px 14px; cursor: pointer; font-size: 12px; color: var(--text-dim);
    list-style: none; user-select: none;
  }
  .payload-peek summary::-webkit-details-marker { display: none; }
  .payload-peek pre {
    margin: 0; padding: 10px 14px; font-size: 11px; color: var(--text-dim);
    font-family: 'SF Mono', Menlo, Consolas, monospace;
    border-top: 1px solid var(--border-soft);
    overflow-x: auto; max-height: 240px;
  }

  /* Buttons */
  .btn {
    min-height: var(--hit); padding: 0 16px; border-radius: 10px;
    background: var(--primary); color: #001018; font-weight: 700; font-size: 15px;
    border: 0; cursor: pointer;
  }
  .btn[disabled] { opacity: .4; cursor: not-allowed; }
  .btn.ghost { background: var(--panel-3); color: var(--text); border: 1px solid var(--border); }
  .btn.full { width: 100%; }
  .btn-add-service {
    width: 100%; min-height: var(--hit); border-radius: 10px;
    background: transparent; border: 2px dashed var(--primary);
    color: var(--primary); font-weight: 700; cursor: pointer; margin-top: 8px;
  }

  /* Empty states */
  .empty {
    text-align: center; padding: 40px 20px; color: var(--text-mute); font-size: 14px;
  }

  /* ==================== TABLET (768px+) ==================== */
  @media (min-width: 768px) {
    .kpis { grid-template-columns: repeat(4, 1fr); }
    .herogm { grid-column: 1 / -1; }
    .herogm .v { font-size: 64px; }
    .pagetitle { font-size: 30px; }
    .main { padding: 24px 24px calc(100px + var(--safe-bot)); }
    .scrim { padding: 5vh 20px; align-items: flex-start; justify-content: center; }
    .modal {
      width: 620px; height: auto; max-height: 90vh; border-radius: 16px;
      border: 1px solid var(--border);
    }
    .radio-group { grid-template-columns: repeat(5, 1fr); }
  }

  /* ==================== DESKTOP (1025px+) ==================== */
  @media (min-width: 1025px) {
    .app { flex-direction: row; }
    .sidebar {
      display: flex; flex-direction: column; width: 260px;
      background: #0a1120; border-right: 1px solid var(--border-soft);
      padding: 18px 14px calc(18px + var(--safe-bot)); gap: 4px;
      position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0;
    }
    .sidebar .brand {
      padding: 6px 8px 18px; border-bottom: 1px solid var(--border-soft); margin-bottom: 12px;
    }
    .sidebar .brand .name { font-size: 19px; }
    .sidebar .brand .sub { font-size: 10px; }
    .sidebar .navlabel {
      font-size: 10px; color: var(--text-mute); padding: 14px 8px 4px;
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .sidebar .navitem {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 10px; border-radius: 7px; cursor: pointer;
      color: var(--text-dim); font-size: 14px; border: 0; background: transparent;
      text-align: left;
    }
    .sidebar .navitem:hover { background: #0f1a30; color: var(--text); }
    .sidebar .navitem.active { background: var(--primary-soft); color: var(--primary); }
    .sidebar .navitem .ico { width: 22px; text-align: center; font-size: 15px; }

    .topbar { display: flex; padding: 14px 26px; position: relative; }
    .topbar .brand { display: none; }

    .main { padding: 22px 26px 40px; max-width: 1400px; }
    .bottomnav { display: none; }

    .kpis { grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .herogm .v { font-size: 72px; }
    .pagetitle { font-size: 34px; }

    .appt {
      grid-template-columns: 80px 1fr auto auto; gap: 14px; align-items: center; padding: 16px 18px;
    }
    .appt .cta {
      grid-column: auto; min-height: 40px; padding: 0 18px; font-size: 14px; margin-top: 0;
    }
    .appt .status { font-size: 12px; }
  }

  /* Utility */
  .muted { color: var(--text-dim); }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR (desktop only) -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">IHS</div>
      <div class="namewrap">
        <div class="name">Real Time Appointment Tracker</div>
        <div class="sub">RTAT</div>
      </div>
    </div>
    <div class="navlabel">Workspace</div>

function isStuck(a){
  // Mock rule: appts with hour >= 1:30p are "past end" (demo logic)
  const t = parseTime(a.time);
  const now = new Date(); now.setHours(14, 0, 0, 0);
  return (t * 60 < 14 * 60);
}
function parseTime(s){
  // "2:30p" -> 14.5, "8:30a" -> 8.5
  const m = s.match(/(\d+)(?::(\d+))?([ap])/);
  if (!m) return 0;
  let h = +m[1];
  const min = +(m[2] || 0);
  if (m[3] === 'p' && h !== 12) h += 12;
  if (m[3] === 'a' && h === 12) h = 0;
  return h + min/60;
}
function renderSyncBar(n){
  if (n === 0) return `
    <div class="syncbar">
      <div class="dot"></div>
      <div class="label">All submissions synced to CRM</div>
    </div>`;
  return `

      <div class="dot"></div>
      <div class="label"><b>${n}</b> submission${n===1?'':'s'} queued offline</div>
      <button id="syncFlushBtn">Sync now</button>
    </div>`;
}
function syncFlush(){

  submissions.forEach(s => s.offline_queued = false);

  render();
}

function uniqueApptsWithStatus(list, subs){
  return list.map(a => {
    const subsForAppt = subs.filter(s => s.appointment_id === a.id);
    let status = 'open';
    if (subsForAppt.some(s => s.outcome === 'sold')) status = 'sold';
    else if (subsForAppt.some(s => s.outcome === 'nosale')) status = 'nosale';
    else if (subsForAppt.some(s => s.outcome === 'callback')) status = 'callback';
    else if (subsForAppt.some(s => s.outcome === 'noshow')) status = 'noshow';
    return { ...a, status, subsForAppt };
  });
}
function renderApptCard(a){
  const isOpen = a.status === 'open';
  const statusLabel = {open:'Open',sold:'Sold',nosale:'Not Sold',callback:'Callback',noshow:'No Show'}[a.status];
  const soldDollars = a.subsForAppt
    ? a.subsForAppt.reduce((sum, s) => sum + (s.services || []).reduce((ss, x) => ss + x.sold_amount, 0), 0)
    : 0;
  const gmPct = a.subsForAppt && a.subsForAppt.length && a.status === 'sold'
    ? blendedGM(a.subsForAppt) : null;
  return `
    <div class="appt">
      <div>
        <div class="time">${a.time}</div>
        <div class="cust">${a.customer}</div>
        <div class="meta"><span>${a.brand}</span> <span class="dot">·</span> <span>${a.market}</span> <span class="dot">·</span> <span>${a.rep}</span></div>

      </div>
      <span class="status ${a.status}">${statusLabel}</span>
      <button class="cta ${isOpen ? '' : 'secondary'}" data-dispo="${a.id}">${isOpen ? 'What happened?' : 'View / edit'}</button>
    </div>
  `;
}

/* ---------- METRICS ---------- */
function metrics(apptsList, subsList){
  const solds = subsList.filter(s => s.outcome === 'sold');
  const sold$ = solds.reduce((a, s) => a + (s.services || []).reduce((ss,x) => ss + x.sold_amount, 0), 0);
  const cogs$ = solds.reduce((a, s) => a + (s.services || []).reduce((ss,x) => ss + x.cogs + x.finance_fee, 0), 0);
  const gm$ = sold$ - cogs$;
  const gmPct = sold$ > 0 ? gm$ / sold$ * 100 : 0;

  const apptsWithSub = subsList.map(s => s.appointment_id).filter(id => !id.startsWith('MANUAL'));
  const apptsDispositioned = new Set(apptsWithSub);
  const apptsRan = apptsList.length;  // for enterprise we count scheduled as ran for demo
  const soldCt = new Set(solds.map(s => s.appointment_id)).size;
  const nosaleCt = subsList.filter(s => s.outcome === 'nosale').length;
  const cbCt = subsList.filter(s => s.outcome === 'callback').length;
  const noshowCt = subsList.filter(s => s.outcome === 'noshow').length;
  const open = apptsList.length - apptsDispositioned.size;

  const signed = solds.filter(s => s.signed === true).length;

  return {
    appts: apptsList.length,
    apptsRan,
    sold: soldCt, signed_contracts: signed,
    nosale: nosaleCt, callback: cbCt, noshow: noshowCt, open,
    sold$, gm$, gmPct,
    avg$: soldCt ? sold$ / soldCt : 0,
    closePct: (apptsRan > 0) ? (soldCt / apptsRan * 100) : 0
  };
}
function rollupBy(apptsList, subsList, field){
  const keys = [...new Set(apptsList.map(a => a[field]))].sort();
  return keys.map(key => {
    const apptsK = apptsList.filter(a => a[field] === key);
    const subsK = subsList.filter(s => s[field] === key);
    return { key, ...metrics(apptsK, subsK) };
  }).sort((a,b) => b.sold$ - a.sold$);
}
function renderRollup(rows, field){
  if (rows.length === 0) return `<div class="empty">No data for this scope.</div>`;
  const max$ = Math.max(...rows.map(r => r.sold$), 1);
  return `
    <div class="rollup">
      <div class="table-scroll">
        <table>
          <thead><tr>
            <th>${field === 'brand' ? 'Brand' : 'Market'}</th>
            <th class="num">Ran</th>
            <th class="num">Sold</th>
            <th class="num">Close %</th>
            <th class="num">$ Sold</th>
            <th class="num">GM %</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td class="name">${r.key}</td>
                <td class="num">${r.apptsRan}</td>
                <td class="num">${r.sold}</td>
                <td class="num">${r.closePct.toFixed(0)}%</td>
                <td class="num">
                  $${fmt(r.sold$)}
                  <div class="mini-bar"><span style="width:${(r.sold$/max$*100).toFixed(1)}%"></span></div>
                </td>
                <td class="num"><span class="pill ${gmClass(r.gmPct)}">${r.gmPct ? r.gmPct.toFixed(1)+'%' : '—'}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

/* ---------- ENTRY MODAL (the money screen) ---------- */
function openEntry(appt){
  selectedAppt = appt;
  visitServices = [];
  visitCustomer = appt ? {
    first_name: (appt.customer.split(',')[1]||'').trim(),
    last_name: (appt.customer.split(',')[0]||'').trim(),
    phone: '',
    zip: '',
    brand: appt.brand,
    market: appt.market,
    rep: appt.rep
  } : null;

  document.getElementById('modalTitle').textContent = appt ? appt.customer : 'New Walk-in Entry';
  document.getElementById('modalScrim').classList.add('open');
  document.body.style.overflow = 'hidden';

  renderEntryStep1();
}
function closeEntry(){
  document.getElementById('modalScrim').classList.remove('open');
  document.body.style.overflow = '';
  selectedAppt = null; visitServices = []; visitCustomer = null;
  render();
}

/* Sold form (Step 3) — multi-service aware */
function renderSoldForm(){
  const body = document.getElementById('modalBody');
  const foot = document.getElementById('modalFoot');
  const svcCount = visitServices.length;

  const sc = persona.scope || {};
  const brandsAvailable = (sc.brands && sc.brands.length) ? sc.brands : BRANDS;
  const lockedBrand = visitCustomer && visitCustomer.brand ? visitCustomer.brand : '';

  const cartHTML = svcCount > 0 ? `
    <div class="services-list">
      <div class="muted" style="font-size:11px; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Services already entered this visit</div>
      ${visitServices.map((s,i) => `
        <div class="row">
          <div class="name">${s.service}</div>
          <div class="amt">$${fmt(s.sold_amount)} <span class="muted">· ${s.gm_pct.toFixed(1)}% GM</span></div>

        <div class="amt">$${fmt(visitServices.reduce((a,s)=>a+s.sold_amount,0))} <span class="muted">· ${blendedGMFromBatch(visitServices).toFixed(1)}% blended</span></div>
      </div>
    </div>
  ` : '';

  body.innerHTML = `
    ${cartHTML}

    <div class="field">
      <label class="lbl">Service sold</label>
      <select class="select" id="s-service">
        <option value="">Pick a service…</option>
        ${SERVICES.map(s => `<option>${s}</option>`).join('')}
      </select>
      <div class="hint">Each service is logged as its own job. Add more below if they bought multiple.</div>
    </div>

    <div class="field">
      <label class="lbl">Sold $ (contract amount)</label>
      <input class="input" id="s-sold" type="number" inputmode="decimal" placeholder="45000" oninput="recalc()" />
    </div>
    <div class="field">
      <label class="lbl">COGS $ (material + labor cost)</label>
      <input class="input" id="s-cogs" type="number" inputmode="decimal" placeholder="25000" oninput="recalc()" />
    </div>
    <div class="field">
      <label class="lbl">Finance type</label>
      <div class="radio-group" id="fin-group">
        ${Object.entries(FIN_LABELS).map(([k,v]) => `
          <label class="radio-tile ${k==='cash'?'checked':''}">
            <input type="radio" name="fin" value="${k}" ${k==='cash'?'checked':''} onchange="recalc()">
            ${v}
          </label>
        `).join('')}
      </div>
    </div>

    <div class="live-stats">
      <div>
        <div class="l">Net / GM</div>
        <div class="net"><span id="s-net">$0</span> · <span class="gm-chip" id="s-gmchip">0.0%</span></div>
      </div>
    </div>

    <div class="field">
      <label class="lbl">
        <input type="checkbox" id="s-signed" checked> Contract signed
      </label>
      <div class="hint">Uncheck if verbal yes but no signed paperwork yet.</div>
    </div>

    <div class="field">
      <label class="lbl">Notes (optional)</label>
      <textarea class="textarea" id="s-notes" placeholder="e.g. referred by Okafor; financing approved"></textarea>
    </div>
  `;

  foot.innerHTML = `
    <button class="btn ghost" onclick="renderOutcomePicker()">← Back</button>
    <button class="btn full" id="submitSoldBtn">Save ${svcCount > 0 ? 'service #' + (svcCount+1) : 'sale'}</button>
  `;

  // Wire up radio tile UI
  document.querySelectorAll('#fin-group input[type=radio]').forEach(r => {
    r.addEventListener('change', () => {
      document.querySelectorAll('#fin-group .radio-tile').forEach(t => t.classList.remove('checked'));
      r.closest('.radio-tile').classList.add('checked');
    });
  });
  document.getElementById('submitSoldBtn').addEventListener('click', captureSoldService);
  recalc();
}
function recalc(){
  const sold = +(document.getElementById('s-sold') || {value:0}).value || 0;
  const cogs = +(document.getElementById('s-cogs') || {value:0}).value || 0;
  const finEl = document.querySelector('input[name=fin]:checked');
  const fin = finEl ? finEl.value : 'cash';
  const fee = (FIN_RATES[fin] || 0) * sold;
  const gm = sold - cogs - fee;
  const pct = sold > 0 ? gm / sold * 100 : 0;
  const netEl = document.getElementById('s-net');
  const chip = document.getElementById('s-gmchip');
  if (netEl) netEl.textContent = '$' + fmt(sold);
  if (chip) {
    chip.textContent = pct.toFixed(1) + '%';
    chip.className = 'gm-chip ' + gmClass(pct);
  }
}
function captureSoldService(){
  const service = document.getElementById('s-service').value;
  if (!service) { alert('Pick a service.'); return; }
  const sold = +document.getElementById('s-sold').value || 0;
  if (!sold) { alert('Enter the sold amount.'); return; }
  const cogs = +document.getElementById('s-cogs').value || 0;
  const finEl = document.querySelector('input[name=fin]:checked');
  const fin = finEl ? finEl.value : 'cash';
  const fee = FIN_RATES[fin] * sold;
  const gm$ = sold - cogs - fee;
  const gmPct = sold > 0 ? gm$/sold*100 : 0;

  visitServices.push({
    service,
    sold_amount: sold, discount: 0, cogs,
    finance_type: fin, finance_fee: Math.round(fee),
    net: sold, gm_dollars: Math.round(gm$), gm_pct: +gmPct.toFixed(2),
    signed: document.getElementById('s-signed').checked,
    notes: document.getElementById('s-notes').value.trim()
  });
  renderVisitConfirm();
}
function renderVisitConfirm(){
  const body = document.getElementById('modalBody');
  const foot = document.getElementById('modalFoot');
  const total = visitServices.reduce((a,s)=>a+s.sold_amount,0);
  const blended = blendedGMFromBatch(visitServices);
  body.innerHTML = `
    <div class="confirm">
      <div class="icn">✓</div>
      <h2>${visitServices.length > 1 ? 'All services saved' : 'Service saved'}</h2>
      <p>${visitServices.length} service${visitServices.length===1?'':'s'} logged on this visit.</p>
      <div class="crm-stamp">● Submitted to CRM</div>
      <div class="services-list" style="text-align:left;">
        ${visitServices.map(s => `
          <div class="row">
            <div class="name">${s.service}</div>
            <div class="amt">$${fmt(s.sold_amount)} <span class="muted">· ${s.gm_pct.toFixed(1)}% GM</span></div>
          </div>
        `).join('')}
        <div class="row total">
          <div class="name">Visit total</div>
          <div class="amt">$${fmt(total)} <span class="muted">· ${blended.toFixed(1)}% blended</span></div>
        </div>
      </div>
      <button class="btn-add-service" id="addAnotherBtn">＋ Add another service</button>
    </div>
  `;
  foot.innerHTML = `
    <button class="btn full" id="finishVisitBtn">Done</button>
  `;
  document.getElementById('addAnotherBtn').addEventListener('click', renderSoldForm);
  document.getElementById('finishVisitBtn').addEventListener('click', finishVisit);
}
function finishVisit(){
  const rec = buildSubmission('sold', visitServices);
  submissions.push(rec);
  saveSubs();
  renderFinalConfirm(rec);
}
function renderFinalConfirm(rec){
  const body = document.getElementById('modalBody');
  const foot = document.getElementById('modalFoot');
  const payload = JSON.stringify(rec, null, 2);
  body.innerHTML = `
    <div class="confirm">
      <div class="icn">✓</div>
      <h2>Saved & on its way</h2>
      <p>The record has been queued${navigator.onLine ? ' and submitted to CRM' : ' offline — will sync when you reconnect'}.</p>
      <div class="crm-stamp">${navigator.onLine ? '● Submitted to CRM' : '◷ Queued'}</div>
      <details class="payload-peek">
        <summary>▸ View payload (for dev / Margin IQ team)</summary>
        <pre>${escapeHtml(payload)}</pre>
      </details>
    </div>
  `;
  foot.innerHTML = `
    <button class="btn full" onclick="closeEntry()">Done</button>
  `;
}

/* Build a clean submission payload (the write-back contract for dev) */
function buildSubmission(outcome, services, extra){
  extra = extra || {};
  const appt = selectedAppt;
  const cust = visitCustomer || {};
  const now = new Date();
  return {
    rtat_submission_id: 'SUB-' + now.getTime().toString(36).toUpperCase(),
    timestamp: now.toISOString(),
    rep_id: persona.email,
    rep_name: appt ? appt.rep : persona.name,
    brand: appt ? appt.brand : cust.brand,
    market: appt ? appt.market : cust.market,
    appointment_id: appt ? appt.id : 'MANUAL-' + now.getTime().toString(36).toUpperCase(),
    customer: {
      first_name: cust.first_name || (appt ? (appt.customer.split(',')[1]||'').trim() : ''),
      last_name:  cust.last_name  || (appt ? (appt.customer.split(',')[0]||'').trim() : ''),
      phone: cust.phone || '',
      zip:   cust.zip   || ''
    },
    lead_source: cust.lead_source || null,
    outcome,
    services: services,
    signed: services.length ? services.every(s => s.signed) : null,
    extra,
    offline_queued: !navigator.onLine
  };
}

/* ---------- HELPERS ---------- */
function fmt(n){ return (n||0).toLocaleString('en-US',{maximumFractionDigits:0}); }
function gmClass(p){ return p >= GM_GOOD ? 'good' : p >= GM_WARN ? 'warn' : 'bad'; }
function blendedGM(subs){
  const sold = subs.reduce((a, s) => a + (s.services||[]).reduce((ss,x) => ss + x.sold_amount, 0), 0);
  const cogs = subs.reduce((a, s) => a + (s.services||[]).reduce((ss,x) => ss + x.cogs + x.finance_fee, 0), 0);
  return sold > 0 ? (sold - cogs) / sold * 100 : 0;
}
function blendedGMFromBatch(batch){
  const sold = batch.reduce((a, s) => a + s.sold_amount, 0);
  const cogs = batch.reduce((a, s) => a + s.cogs + s.finance_fee, 0);
  return sold > 0 ? (sold - cogs) / sold * 100 : 0;
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function initPersonaPicker(){
  const sel = document.getElementById('personaSelect');
  sel.innerHTML = PERSONAS.map(p => `<option value="${p.key}" ${p.key===persona.key?'selected':''}>${p.name} — ${p.role}</option>`).join('');

    persona = PERSONAS.find(p => p.key === sel.value);

function initSidebarNav(){
  document.querySelectorAll('.sidebar .navitem[data-page]').forEach(b => {
    b.addEventListener('click', () => goto(b.dataset.page));

}
function initModalClose(){
  document.getElementById('modalClose').addEventListener('click', closeEntry);
  document.getElementById('modalScrim').addEventListener('click', e => {

  });
}
function registerSW(){
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}

document.addEventListener('DOMContentLoaded', function(){
  initPersonaPicker();
  initSidebarNav();
  initModalClose();
  applyPersona();   // triggers render
  registerSW();
});
